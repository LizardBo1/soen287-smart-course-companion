<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Course Companion</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container-main">
        <div class="container">
            <h1 class="font-huge gradient-text">
                Smart Course <span class="text-accent-purple">Companion</span>
            </h1>
            <p class="login-desc">Making school fun :)</p>

            <div class="container-portal-choice">
                <div class="intruct-stu-choice" onclick="openModal('student')">
                    <a href="student-dashboard.html">
                    <div class="icon-circle">🎓</div>
                    <h2>Student</h2>
                    <p>Track your grades, assessments, and academic progress.</p>
                    </a>
                </div>

                <div class="intruct-stu-choice" onclick="openModal('instructor')">
                    <a href="instructor-dashboard.html">
                    <div class="icon-circle instructor-icon">🏛️</div>
                    <h2>Instructor</h2>
                    <h5 class="login-admin-portal">ADMIN PORTAL</h5>
                    <p>Manage course structures and weight</p>
                </a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal" onclick="handleOverlayClick(event)">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>

            <div class="modal-icon" id="modalIcon"></div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-subtitle" id="modalSubtitle"></p>

            <label class="form-label">ID</label>
            <input class="form-input" type="text" id="loginId" placeholder="Enter your ID">

            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="loginPassword" placeholder="*********">

            <button class="modal-submit" id="modalSubmit" onclick="handleLogin()">Sign In</button>

        </div>
    </div>

    <script src="scripts/index.js"></script>
</body>

</html>
