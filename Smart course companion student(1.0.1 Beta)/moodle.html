<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moodle Courses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="course.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <h1 class="logo">Concordia</h1>

            <nav>
                <a href="student-dashboard.html" class="nav-item">🏠 Home</a>
                <a href="moodle.html" class="nav-item active">📚 Moodle Courses</a>
                <a href="grades.html" class="nav-item">📝 Grades</a>
                <a href="enrollment.html" class="nav-item">🔖 Enrollment</a>
            </nav>
        </div>

        <!-- Apple Style Account Section -->
        <div class="account-section">

            <input type="checkbox" id="account-toggle" class="account-toggle">

            <label for="account-toggle" class="account-button">
                <span>Account</span>
                <span class="arrow">⌄</span>
            </label>

            <div class="account-dropdown">
                <div class="account-item">Student Information</div>
                <div class="account-item">Settings</div>
                <div class="account-item logout"><a href="index.html">Log Out</a></div>
            </div>

        </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <h1 class="page-title">My Courses</h1>

        <div class="courses-container">

            <article class="card course-card">
                <a href="SOEN287.html" class="course-link">
                    <div class="course-img">
                        <img src="SOEN287srcimg.jpg" alt="SOEN287 Web Programming">
                    </div>
                    <h2>SOEN287</h2>
                    <h3>Web Programming</h3>
                </a>
            </article>

            <article class="card course-card">
                <a href="COMP353.html" class="course-link">
                    <div class="course-img">
                        <img src="Comp353srcimg.png" alt="COMP353 Database">
                    </div>
                    <h2>COMP353</h2>
                    <h3>Database</h3>
                </a>
            </article>

            <article class="card course-card">
                <a href="COMP218.html" class="course-link">
                    <div class="course-img">
                        <img src="COMP218srcimg.jpg" alt="COMP218 Fundamentals of Programming">
                    </div>
                    <h2>COMP218</h2>
                    <h3>Fundamentals of Programming</h3>
                </a>
            </article>

            <article class="card course-card">
                <a href="COMP248.html" class="course-link">
                    <div class="course-img">
                        <img src="COMP248srcimg.png" alt="COMP248 Object-Oriented Programming">
                    </div>
                    <h2>COMP248</h2>
                    <h3>Object-Oriented Programming</h3>
                </a>
            </article>

        </div>

    </main>

</div>

</html>
